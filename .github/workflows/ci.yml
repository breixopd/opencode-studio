name: CI
on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bunx tsc --noEmit
      # Run each file in its own process — mock.module leaks across files in one bun test run.
      - name: Test (isolated per file)
        run: |
          set -euo pipefail
          failed=0
          count=0
          while IFS= read -r f; do
            count=$((count + 1))
            echo "::group::bun test $f"
            if ! bun test --timeout=30000 "$f"; then
              echo "::error::FAILED $f"
              failed=1
            fi
            echo "::endgroup::"
          done < <(find src -name '*.test.ts' | sort)
          echo "Ran $count test files"
          exit $failed

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Ensure npm CLI supports OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Publish to npm
        env:
          # Fallback if Trusted Publisher is not configured yet on npmjs.com
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          echo "Publishing opencode-studio@$VERSION"
          if [[ "$VERSION" == *-* ]]; then
            PREID=$(node -p "require('./package.json').version.split('-')[1].split('.')[0]")
            npm publish --access public --tag "$PREID"
            echo "Published with dist-tag: $PREID (latest remains unchanged)"
          else
            npm publish --access public
            echo "Published with dist-tag: latest"
          fi
